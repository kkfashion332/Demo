<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111;
            color: #fff;
        }
        .login-box {
            background: #222;
            padding: 50px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        h2 {
            font-size: 32px;
            margin-bottom: 30px;
            font-weight: 800;
            color: #00d2ff;
        }
        input {
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            background: #333;
            border: 2px solid #444;
            border-radius: 10px;
            color: #fff;
            font-size: 18px;
            outline: none;
        }
        input:focus {
            border-color: #00d2ff;
        }
        button {
            width: 100%;
            padding: 18px;
            margin-top: 20px;
            background: #00d2ff;
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #3a7bd5;
            color: #fff;
        }
        .error-msg {
            color: #ff4757;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>LOGIN</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Log In</button>
            <div id="errorBox" class="error-msg"></div>
        </form>
    </div>

    <script>
        // Aapki details ke sath Supabase Initialise kiya
        const SUPABASE_URL = "https://whgottmfbrrwzpodoglw.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_W3LHrXF4NGwpl1j9IxqpOg_X8XDXpBO";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const loginForm = document.getElementById('loginForm');
        const errorBox = document.getElementById('errorBox');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.style.display = 'none';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Supabase Authentication Trigger
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                errorBox.innerText = error.message;
                errorBox.style.display = 'block';
            } else {
                // Login successful! Token generate hoga aur redirect karega
                window.location.href = 'home.html';
            }
        });
    </script>

</body>
</html>
